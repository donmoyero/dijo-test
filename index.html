<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Available Jobs — ImpactGrid Creator Intelligence</title>

<link rel="stylesheet" href="shared.css"/>

<style>
.page-wrap{padding-top:40px;}
</style>
</head>

<body>

<div class="page-wrap">

  <h1 style="text-align:center;">Available Jobs</h1>

  <!-- DIJO HERO -->
  <div style="text-align:center;margin:30px;">
    <h2>Meet Dijo 🤖</h2>
    <p>AI that finds and ranks the best jobs for you</p>

    <button onclick="startMatching()" style="padding:12px 20px;">
      Start AI Matching
    </button>
  </div>

  <!-- STATS -->
  <div style="text-align:center;margin-bottom:20px;">
    <p>Total Jobs: <span id="sTotal">0</span></p>
  </div>

  <!-- SEARCH -->
  <div style="text-align:center;margin-bottom:20px;">
    <input id="searchInput" placeholder="Search jobs..." oninput="filterJobs()" />
  </div>

  <!-- JOBS -->
  <div id="jobsGrid"></div>

</div>

<script>
const API = "https://impactgrid-dijo-api.onrender.com";

let allJobs = [];

/* =========================
   INIT
========================= */
document.addEventListener("DOMContentLoaded", loadJobs);

/* =========================
   LOAD JOBS
========================= */
async function loadJobs() {
  try {
    const res = await fetch(API + "/ai/jobs");
    const data = await res.json();

    allJobs = data.jobs || [];

    document.getElementById("sTotal").textContent = allJobs.length;

    renderJobs(allJobs);

  } catch (err) {
    document.getElementById("jobsGrid").innerHTML = "Failed to load jobs";
  }
}

/* =========================
   START MATCHING (FIXED)
========================= */
async function startMatching() {
  const cv = prompt("Paste your CV");

  if (!cv) return;

  document.getElementById("jobsGrid").innerHTML =
    "<p style='text-align:center;'>Dijo analysing...</p>";

  /* 1️⃣ Extract profile */
  let profile;

  try {
    const res = await fetch(API + "/ai/extract-profile", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ cv_text: cv })
    });

    profile = await res.json();

  } catch (e) {
    console.error(e);
    return;
  }

  /* 2️⃣ Filter jobs using keywords */
  const keywords = profile.search_keywords || [];

  const filtered = allJobs.filter(j => {
    const text = (j.title + " " + j.description).toLowerCase();
    return keywords.some(k => text.includes(k));
  }).slice(0, 8);

  /* 3️⃣ Match */
  const results = [];

  for (let job of filtered) {
    try {
      const res = await fetch(API + "/ai/match", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          cv_text: cv,
          job_description: job.description
        })
      });

      const data = await res.json();

      results.push({
        ...job,
        score: data.result?.score || 0,
        reasons: data.result?.reasons || []
      });

    } catch (e) {}
  }

  results.sort((a,b) => b.score - a.score);

  renderMatches(results.slice(0,3));
}

/* =========================
   FILTER
========================= */
function filterJobs() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allJobs.filter(j =>
    (j.title||"").toLowerCase().includes(q) ||
    (j.company_name||"").toLowerCase().includes(q)
  );

  renderJobs(filtered);
}

/* =========================
   RENDER JOBS
========================= */
function renderJobs(jobs) {
  const el = document.getElementById("jobsGrid");

  el.innerHTML = jobs.map(j => `
    <div style="border:1px solid #333;padding:10px;margin:10px;">
      <h3>${escapeHTML(j.title)}</h3>
      <p>${escapeHTML(j.company_name)}</p>
    </div>
  `).join("");
}

/* =========================
   RENDER MATCHES
========================= */
function renderMatches(jobs) {
  const el = document.getElementById("jobsGrid");

  el.innerHTML = `
    <h3 style="text-align:center;">🔥 Top Matches</h3>

    ${jobs.map((j,i)=>`
      <div style="border:2px solid ${i===0?'gold':'#333'};padding:10px;margin:10px;">
        <h3>${escapeHTML(j.title)}</h3>
        <p>${escapeHTML(j.company_name)}</p>
        <p>${j.score}% Match</p>

        <ul>
          ${(j.reasons||[]).slice(0,2).map(r=>`<li>${escapeHTML(r)}</li>`).join("")}
        </ul>
      </div>
    `).join("")}
  `;
}

/* =========================
   SAFE HTML
========================= */
function escapeHTML(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
