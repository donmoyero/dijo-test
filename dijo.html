<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dijo AI</title>

  <link rel="stylesheet" href="dijo.css">
</head>

<body>

<!-- LANDING -->
<section id="landing">
  <h1>Meet Dijo 🤖</h1>
  <p>Your AI job consultant</p>

  <img src="dijo-mascot.png" style="width:120px;margin:20px 0;"/>

  <button id="startBtn">Start</button>
</section>

<!-- APP -->
<section id="app" style="display:none;">

  <!-- STEP 1 -->
  <div id="step1" class="step active">
    <h2>Welcome 👋</h2>
    <p>I’ll help you get your dream job</p>
    <button class="nextBtn">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" class="step">
    <h2>Upload CV</h2>

    <textarea id="cvText" placeholder="Paste your CV here"></textarea>

    <button class="nextBtn">Analyse</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" class="step">
    <h2>Analysing...</h2>
    <p id="loadingText">Reading your CV...</p>
  </div>

  <!-- STEP 4 -->
  <div id="step4" class="step">
    <h2>Your Best Matches</h2>
    <div id="jobs"></div>
  </div>

  <!-- STEP 5 -->
  <div id="step5" class="step">
    <h2>Applying...</h2>
  </div>

  <!-- STEP 6 -->
  <div id="step6" class="step">
    <h2>Done 🎉</h2>
    <div id="result"></div>
  </div>

</section>

<script src="dijo.js"></script>

</body>
</html>
